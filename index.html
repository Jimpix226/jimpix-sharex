<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jimpix · Share</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --panel: #111118;
    --border: #222230;
    --accent: #e8ff47;
    --accent2: #47b4ff;
    --text: #f0f0f8;
    --muted: #555570;
    --danger: #ff4757;
    --success: #2ecc71;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 10%, rgba(232,255,71,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 10% 90%, rgba(71,180,255,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── LOGIN ── */
  #login-screen {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .login-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 40px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6);
    animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
  }

  .login-logo {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 6px;
  }

  .login-logo span { color: var(--accent); }

  .login-sub {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: .78rem;
    margin-bottom: 36px;
  }

  .field {
    margin-bottom: 18px;
  }

  label {
    display: block;
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type=text], input[type=password] {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    font-size: .9rem;
    padding: 13px 16px;
    outline: none;
    transition: border-color .2s;
  }

  input:focus { border-color: var(--accent); }

  .btn {
    display: block;
    width: 100%;
    padding: 14px;
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: .95rem;
    font-weight: 800;
    cursor: pointer;
    letter-spacing: .02em;
    transition: transform .15s, opacity .15s;
    margin-top: 8px;
  }

  .btn:hover { opacity: .85; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn.secondary {
    background: var(--border);
    color: var(--text);
    margin-top: 0;
  }

  .btn.danger { background: var(--danger); color: #fff; }

  .error-msg {
    color: var(--danger);
    font-size: .8rem;
    font-family: 'Space Mono', monospace;
    margin-top: 12px;
    text-align: center;
    min-height: 20px;
    transition: opacity .2s;
  }

  /* ── APP ── */
  #app-screen {
    display: none;
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 720px;
    padding: 20px;
    animation: slideUp .4s cubic-bezier(.16,1,.3,1) both;
  }

  .app-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .app-logo {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -1px;
  }

  .app-logo span { color: var(--accent); }

  .logout-btn {
    font-family: 'Space Mono', monospace;
    font-size: .75rem;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 7px 14px;
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }

  .logout-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* Paste zone */
  #paste-zone {
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: border-color .25s, background .25s;
    background: var(--panel);
    position: relative;
    overflow: hidden;
  }

  #paste-zone.has-image {
    border-color: var(--accent);
    padding: 16px;
  }

  #paste-zone.drag-over {
    border-color: var(--accent2);
    background: rgba(71,180,255,0.05);
  }

  .paste-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    opacity: .3;
    transition: opacity .2s;
  }

  #paste-zone.has-image .paste-icon { display: none; }

  .paste-hint {
    color: var(--muted);
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .paste-hint kbd {
    background: var(--border);
    color: var(--text);
    border-radius: 6px;
    padding: 2px 8px;
    font-family: 'Space Mono', monospace;
    font-size: .8rem;
  }

  .paste-sub {
    color: var(--muted);
    font-size: .8rem;
    font-family: 'Space Mono', monospace;
  }

  #paste-zone.has-image .paste-hint,
  #paste-zone.has-image .paste-sub { display: none; }

  #preview-img {
    display: none;
    max-width: 100%;
    max-height: 420px;
    border-radius: 12px;
    object-fit: contain;
  }

  #paste-zone.has-image #preview-img { display: block; margin: 0 auto; }

  /* Actions */
  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }

  /* Share panel */
  #share-panel {
    display: none;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-top: 16px;
    animation: slideUp .3s cubic-bezier(.16,1,.3,1) both;
  }

  .share-label {
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  .share-link-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .share-link-box {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    font-family: 'Space Mono', monospace;
    font-size: .75rem;
    color: var(--accent2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    user-select: all;
    cursor: text;
  }

  .copy-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: var(--radius);
    padding: 11px 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: .8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity .15s;
  }

  .copy-btn:hover { opacity: .8; }
  .copy-btn.copied { background: var(--success); color: #fff; }

  .share-note {
    font-size: .75rem;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    margin-top: 10px;
  }

  /* ── VIEW SCREEN ── */
  #view-screen {
    display: none;
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 800px;
    padding: 20px;
    text-align: center;
    animation: slideUp .5s cubic-bezier(.16,1,.3,1) both;
  }

  .view-header {
    margin-bottom: 24px;
  }

  .view-logo { font-size: 1.4rem; font-weight: 800; letter-spacing: -1px; }
  .view-logo span { color: var(--accent); }

  #view-img {
    max-width: 100%;
    max-height: 70vh;
    border-radius: 16px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    display: block;
    margin: 0 auto 20px;
  }

  .view-actions { display: flex; justify-content: center; gap: 12px; flex-wrap: wrap; }

  .dl-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: var(--radius);
    padding: 12px 24px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    cursor: pointer;
    font-size: .9rem;
    text-decoration: none;
    display: inline-block;
    transition: opacity .15s;
  }

  .dl-btn:hover { opacity: .8; }

  .no-image-msg {
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: .9rem;
    margin-top: 40px;
  }

  /* Animations */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .shake {
    animation: shake .4s cubic-bezier(.36,.07,.19,.97) both;
  }

  @keyframes shake {
    10%, 90% { transform: translateX(-2px); }
    20%, 80% { transform: translateX(4px); }
    30%, 50%, 70% { transform: translateX(-6px); }
    40%, 60% { transform: translateX(6px); }
  }
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Jimp<span>ix</span></div>
    <div class="login-sub">// private image share</div>
    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="username" autocomplete="username" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- ── APP ── -->
<div id="app-screen">
  <div class="app-header">
    <div class="app-logo">Jimp<span>ix</span></div>
    <button class="logout-btn" onclick="doLogout()">sign out</button>
  </div>

  <div id="paste-zone" tabindex="0" onclick="document.getElementById('file-input').click()">
    <div class="paste-icon">📋</div>
    <div class="paste-hint">Press <kbd>Ctrl + V</kbd> to paste an image</div>
    <div class="paste-sub">or click to choose a file</div>
    <img id="preview-img" src="" alt="preview" />
  </div>

  <input type="file" id="file-input" accept="image/*" style="display:none" onchange="loadFile(this)" />

  <div class="actions">
    <button class="btn secondary" onclick="clearImage()">✕ Clear</button>
    <button class="btn" onclick="generateLink()">🔗 Generate Share Link</button>
  </div>

  <div id="share-panel">
    <div class="share-label">Share link</div>
    <div class="share-link-row">
      <div class="share-link-box" id="share-link-text"></div>
      <button class="copy-btn" id="copy-btn" onclick="copyLink()">Copy</button>
    </div>
    <div class="share-note">⚠ Anyone with this link can view the image — no login required for viewers.</div>
  </div>
</div>

<!-- ── VIEW ── -->
<div id="view-screen">
  <div class="view-header">
    <div class="view-logo">Jimp<span>ix</span></div>
  </div>
  <img id="view-img" src="" alt="Shared image" />
  <div class="view-actions">
    <a id="dl-link" class="dl-btn" download="jimpix-image.png">⬇ Download</a>
  </div>
</div>

<script>
  // ── Auth ──
  const CORRECT_USER = 'Jimpix';
  const CORRECT_PASS = 'hessdalen';
  const SESSION_KEY  = 'jimpix_auth';

  function doLogin() {
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value;
    const err = document.getElementById('login-error');
    if (u === CORRECT_USER && p === CORRECT_PASS) {
      sessionStorage.setItem(SESSION_KEY, '1');
      err.textContent = '';
      showApp();
    } else {
      err.textContent = 'Invalid credentials.';
      document.querySelector('.login-card').classList.remove('shake');
      void document.querySelector('.login-card').offsetWidth;
      document.querySelector('.login-card').classList.add('shake');
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter' && document.getElementById('login-screen').style.display !== 'none') doLogin();
  });

  function doLogout() {
    sessionStorage.removeItem(SESSION_KEY);
    location.hash = '';
    location.reload();
  }

  // ── Image state ──
  let currentDataURL = null;

  function setImage(dataURL) {
    currentDataURL = dataURL;
    document.getElementById('preview-img').src = dataURL;
    document.getElementById('paste-zone').classList.add('has-image');
    document.getElementById('share-panel').style.display = 'none';
  }

  function clearImage() {
    currentDataURL = null;
    document.getElementById('preview-img').src = '';
    document.getElementById('paste-zone').classList.remove('has-image');
    document.getElementById('share-panel').style.display = 'none';
    document.getElementById('file-input').value = '';
  }

  // Paste listener
  document.addEventListener('paste', e => {
    if (!isLoggedIn()) return;
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        const blob = item.getAsFile();
        const reader = new FileReader();
        reader.onload = ev => setImage(ev.target.result);
        reader.readAsDataURL(blob);
        break;
      }
    }
  });

  // File picker
  function loadFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setImage(ev.target.result);
    reader.readAsDataURL(file);
  }

  // Drag & drop
  const pz = document.getElementById('paste-zone');
  pz.addEventListener('dragover', e => { e.preventDefault(); pz.classList.add('drag-over'); });
  pz.addEventListener('dragleave', () => pz.classList.remove('drag-over'));
  pz.addEventListener('drop', e => {
    e.preventDefault();
    pz.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type.startsWith('image/')) {
      const reader = new FileReader();
      reader.onload = ev => setImage(ev.target.result);
      reader.readAsDataURL(file);
    }
  });

  // ── Share link via hash ──
  function generateLink() {
    if (!currentDataURL) { alert('Paste or upload an image first.'); return; }
    // Store in localStorage under a random key
    const key = 'jimpix_img_' + Math.random().toString(36).slice(2, 10);
    try {
      localStorage.setItem(key, currentDataURL);
    } catch(e) {
      alert('Image too large to share via link. Try a smaller image.');
      return;
    }
    const url = location.href.split('#')[0] + '#view=' + key;
    document.getElementById('share-link-text').textContent = url;
    document.getElementById('share-panel').style.display = 'block';
    document.getElementById('copy-btn').textContent = 'Copy';
    document.getElementById('copy-btn').classList.remove('copied');
  }

  function copyLink() {
    const text = document.getElementById('share-link-text').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copy-btn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    });
  }

  // ── Routing ──
  function isLoggedIn() { return sessionStorage.getItem(SESSION_KEY) === '1'; }

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('view-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'block';
  }

  function showLogin() {
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('view-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'block';
  }

  function showView(key) {
    const data = localStorage.getItem(key);
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'none';
    document.getElementById('view-screen').style.display = 'block';
    if (data) {
      document.getElementById('view-img').src = data;
      document.getElementById('dl-link').href = data;
    } else {
      document.getElementById('view-img').style.display = 'none';
      const p = document.createElement('p');
      p.className = 'no-image-msg';
      p.textContent = 'Image not found or expired.';
      document.getElementById('view-screen').appendChild(p);
    }
  }

  function route() {
    const hash = location.hash;
    const match = hash.match(/^#view=(.+)$/);
    if (match) {
      showView(match[1]);
    } else if (isLoggedIn()) {
      showApp();
    } else {
      showLogin();
    }
  }

  window.addEventListener('hashchange', route);
  route();
</script>
</body>
</html>
